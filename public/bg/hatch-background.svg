<svg width="100%" viewBox="0 0 600 480" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="hatch" width="24" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="24" stroke="#c8bfb2" stroke-width="0.6"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="vignette">
      <rect width="600" height="480" fill="url(#fade)"/>
    </mask>
  </defs>
  <rect width="600" height="480" fill="url(#hatch)" opacity="0.55" mask="url(#vignette)"/>
  <rect x="0" y="0" width="600" height="1.5" fill="#c8bfb2" opacity="0.3"/>
  <rect x="0" y="478.5" width="600" height="1.5" fill="#c8bfb2" opacity="0.3"/>
  <rect x="0" y="0" width="1.5" height="480" fill="#c8bfb2" opacity="0.3"/>
  <rect x="598.5" y="0" width="1.5" height="480" fill="#c8bfb2" opacity="0.3"/>
</svg>
